# Deploy Shiny R App (Alpha Vantage Reporter) to Posit Connect
# Triggers on push to main when the app or this workflow changes.
# Requires GitHub secrets: CONNECT_SERVER, CONNECT_API_KEY

name: Deploy Shiny R App to Posit Connect

on:
  push:
    branches: [main]
    paths:
      - 'alphavantage_reporter_app/**'
      - '04_deployment/positconnect/shinyr/**'
      - '.github/workflows/deploy-shinyr.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true

      # App expects .env (gitignored). Create placeholder so publish succeeds.
      # Set API_KEY and OLLAMA_API_KEY as env vars in Posit Connect content settings.
      - name: Create placeholder .env for bundle
        run: touch alphavantage_reporter_app/.env

      - name: Publish to Posit Connect
        uses: rstudio/actions/connect-publish@main
        with:
          url: ${{ secrets.CONNECT_SERVER }}
          api-key: ${{ secrets.CONNECT_API_KEY }}
          access-type: acl
          dir: alphavantage_reporter_app
          force: false
